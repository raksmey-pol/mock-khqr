# ============================================================
# Nginx reverse proxy for mock-store-api
#
# This file is a template. Replace API_DOMAIN before use.
# setup-mock-api-domain.sh handles that substitution for you.
# ============================================================

server {
    listen 80;
    server_name API_DOMAIN;

    # Let's Encrypt ACME challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Drop direct-IP requests with no valid Host header
    if ($host = '') {
        return 444;
    }

    gzip            on;
    gzip_types      application/json text/plain application/xml;
    gzip_min_length 256;
    gzip_vary       on;

    keepalive_timeout 65;
    client_max_body_size 1m;

    location / {
        proxy_pass             http://127.0.0.1:4000;
        proxy_http_version     1.1;
        proxy_set_header       Connection "";
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        proxy_buffering        on;
        proxy_buffer_size      4k;
        proxy_buffers          8 4k;
    }
}
